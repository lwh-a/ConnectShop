{% extends 'base.html' %}
{% block content %}
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

<style>
    .checkout-wrapper {
        display: flex;
        max-width: 1000px;
        margin: 50px auto;
        gap: 50px;
    }
    .checkout-form-section { flex: 2; }
    .checkout-summary-section {
        flex: 1;
        background: #f5f5f7;
        padding: 30px;
        border-radius: 20px;
        height: fit-content;
        position: sticky;
        top: 40px;
    }

    /* 입력창 스타일 */
    .form-section { margin-bottom: 40px; }
    .section-title { font-size: 24px; font-weight: 600; margin-bottom: 20px; }
    .input-row { display: flex; gap: 15px; margin-bottom: 15px; }
    .input-row > div { flex: 1; }
    .field-label { font-size: 12px; color: #86868b; margin-bottom: 6px; }
    .form-control {
        width: 100%; padding: 16px; font-size: 17px;
        border: 1px solid #d2d2d7; border-radius: 12px; outline: none;
    }
    .form-control:focus { border-color: #0071e3; box-shadow: 0 0 0 4px rgba(0,113,227,0.1); }

    /* 결제 수단 라디오 버튼 스타일 */
    .payment-option {
        display: flex; align-items: center; gap: 15px; padding: 20px;
        border: 1px solid #d2d2d7; border-radius: 12px; cursor: pointer; margin-bottom: 10px;
    }

    /* ★ 주문 완료 버튼 스타일 ★ */
    .btn-submit {
        width: 100%; background-color: #0071e3; color: white; border: none;
        padding: 18px; border-radius: 12px; font-size: 17px; font-weight: 600;
        cursor: pointer; margin-top: 20px; transition: background 0.2s;
    }
    .btn-submit:hover { background-color: #0077ed; }
</style>

<div class="checkout-wrapper">
    <div class="checkout-form-section">
        <form id="order-form" method="POST" action="{{ url_for('order.place_order') }}">
            <div class="form-section">
                <h2 class="section-title">배송 정보</h2>
                <div class="input-row">
                    <div>
                        <div class="field-label">수령인</div>
                        <input type="text" name="recipient" class="form-control" placeholder="이름" required>
                    </div>
                    <div>
                        <div class="field-label">연락처</div>
                        <input type="text"
                               name="phone"
                               id="phone"  class="form-control"
                               placeholder="010-0000-0000"
                               maxlength="13"
                               oninput="formatPhoneNumber(this)"  required>
                    </div>
                </div>
                <div style="margin-top: 15px;">
                    <div class="field-label">배송 주소</div>
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <input type="text" id="postcode" name="postcode" class="form-control" style="flex: 1;" placeholder="우편번호" readonly>
                        <button type="button" onclick="execDaumPostcode()" style="padding: 0 20px; border-radius: 12px; border: 1px solid #d2d2d7; background: white; cursor: pointer;">우편번호 찾기</button>
                    </div>
                    <input type="text" id="address" name="address" class="form-control" placeholder="기본 주소" readonly required>
                    <input type="text" id="address_detail" name="address_detail" class="form-control" style="margin-top:10px;" placeholder="상세 주소 (아파트, 동, 호수 등)">
                </div>
            </div>

            <div class="form-section">
                <h2 class="section-title">결제 수단</h2>
                <label class="payment-option">
                    <input type="radio" name="payment_method" value="card" checked>
                    <strong>신용카드</strong>
                </label>
                <label class="payment-option">
                    <input type="radio" name="payment_method" value="transfer">
                    <strong>무통장 입금</strong>
                </label>
            </div>
        </form>
    </div>

    <div class="checkout-summary-section">
        <h3 style="margin-bottom: 20px;">주문 요약</h3>
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span>상품 금액</span>
            <span>{{ "{:,}".format(total_price) }}원</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px; color: #06c167;">
            <span>배송비</span>
            <span>무료</span>
        </div>
        <hr style="border: 0; border-top: 1px solid #d2d2d7; margin-bottom: 20px;">
        <div style="display: flex; justify-content: space-between; font-size: 20px; font-weight: 700; margin-bottom: 30px;">
            <span>총계</span>
            <span>{{ "{:,}".format(total_price) }}원</span>
        </div>

        <button type="submit" form="order-form" class="btn-submit">
            주문 완료하기
        </button>
    </div>
</div>

<script>
function execDaumPostcode() {
    new daum.Postcode({
        oncomplete: function(data) {
            var addr = '';

            if (data.userSelectedType === 'R') {
                addr = data.roadAddress;
            } else {
                addr = data.jibunAddress;
            }

            document.getElementById('postcode').value = data.zonecode;
            document.getElementById("address").value = addr;
            document.getElementById("address_detail").focus();
        }
    }).open();
}

function formatPhoneNumber(target) {
let val = target.value.replace(/\D/g, "");

if (val.length > 11) {
    val = val.substring(0, 11);
}

let len = val.length;
let res = "";
if (len <= 3) res = val;
else if (len <= 7) res = val.substr(0, 3) + "-" + val.substr(3);
else res = val.substr(0, 3) + "-" + val.substr(3, 4) + "-" + val.substr(7, 4);

target.value = res;
}
</script>

{% endblock %}
